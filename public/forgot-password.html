<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logicard — Forgot Password</title>
  <link rel="icon" href="/favicon.svg?v=2" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Raleway:wght@300;400;700;800&display=swap" rel="stylesheet" />
</head>
<body class="login-page">

  <nav class="site-header">
    <a href="/" class="site-header-logo"><span class="logi">Logi</span><span class="card">card</span></a>
    <p class="site-header-tagline">Discounts &bull; Giveaways &bull; Rewards &bull; Recognition <span class="site-header-divider">|</span> for the people who keep Britain moving</p>
    <a href="/" class="site-header-back">&lt; Back</a>
  </nav>

  <canvas id="stars"></canvas>

  <div class="login-wrap">

    <a href="/" class="login-logo-link">
      <img src="logicard-logo-hero.png" alt="Logicard" class="login-logo-img" />
    </a>

    <div class="login-card">
      <h1 class="login-title">Forgot Password</h1>
      <p class="login-subtitle">Enter your email and we'll send you a reset link</p>

      <form id="forgotForm" class="login-form" novalidate>

        <div class="lfield">
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required />
        </div>

        <div id="forgotError" class="form-error" role="alert" aria-live="polite"></div>
        <div id="forgotSuccess" class="form-success" role="status" aria-live="polite" style="display:none"></div>

        <button type="submit" class="login-submit-btn" id="forgotBtn">
          <span id="forgotLabel">Send Reset Link</span>
          <svg id="forgotSpinner" class="spinner" viewBox="0 0 24 24" fill="none" style="display:none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2.5" stroke-dasharray="40" stroke-dashoffset="10"/>
          </svg>
        </button>

      </form>

      <p class="login-footer-text">
        <a href="/login.html" class="inline-link">Back to Sign In</a>
      </p>
    </div>

  </div>

  <script src="stars.js"></script>
  <script src="forgot-password.js"></script>
</body>
</html>
