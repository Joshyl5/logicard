<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logicard — Reset Password</title>
  <link rel="icon" href="/favicon.svg?v=2" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Raleway:wght@300;400;700;800&display=swap" rel="stylesheet" />
</head>
<body class="login-page">

  <canvas id="stars"></canvas>

  <div class="login-wrap">

    <a href="/" class="login-logo-link">
      <img src="logicard-logo-hero.png" alt="Logicard" class="login-logo-img" />
    </a>

    <div class="login-card">
      <h1 class="login-title">Reset Password</h1>
      <p class="login-subtitle">Choose a new password for your account</p>

      <div id="invalidToken" style="display:none;text-align:center;padding:20px 0">
        <p style="color:#e53e3e;font-size:15px;margin:0 0 16px">This reset link is invalid or has expired.</p>
        <a href="/forgot-password.html" class="inline-link">Request a new reset link</a>
      </div>

      <form id="resetForm" class="login-form" novalidate>

        <div class="lfield">
          <label for="password">New Password</label>
          <div class="pw-wrap">
            <input id="password" name="password" type="password" placeholder="At least 8 characters" autocomplete="new-password" required />
            <button type="button" class="pw-toggle" id="pwToggle1" aria-label="Show password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="lfield">
          <label for="confirmPassword">Confirm New Password</label>
          <div class="pw-wrap">
            <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Repeat your new password" autocomplete="new-password" required />
            <button type="button" class="pw-toggle" id="pwToggle2" aria-label="Show password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="resetError" class="form-error" role="alert" aria-live="polite"></div>
        <div id="resetSuccess" class="form-success" role="status" aria-live="polite" style="display:none"></div>

        <button type="submit" class="login-submit-btn" id="resetBtn">
          <span id="resetLabel">Set New Password</span>
          <svg id="resetSpinner" class="spinner" viewBox="0 0 24 24" fill="none" style="display:none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2.5" stroke-dasharray="40" stroke-dashoffset="10"/>
          </svg>
        </button>

      </form>

      <p class="login-footer-text" id="backToLogin" style="display:none">
        <a href="/login.html" class="inline-link">Back to Sign In</a>
      </p>
    </div>

  </div>

  <script src="stars.js"></script>
  <script src="reset-password.js"></script>
</body>
</html>
