<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Box lid (gold) -->
  <rect x="8" y="22" width="48" height="12" rx="3" fill="#F5A800"/>
  <!-- Lid centre crease -->
  <line x1="32" y1="22" x2="32" y2="34" stroke="#C07800" stroke-width="1.2" stroke-dasharray="2.5,2"/>
  <!-- Box body (orange) -->
  <rect x="8" y="33" width="48" height="26" rx="3" fill="#E07A00"/>
  <!-- Lid / body edge -->
  <line x1="8" y1="34" x2="56" y2="34" stroke="#C06000" stroke-width="1"/>
  <!-- Vertical tape -->
  <rect x="29" y="22" width="6" height="37" fill="#071d40"/>
  <!-- Horizontal tape -->
  <rect x="8" y="44" width="48" height="6" fill="#071d40"/>
  <!-- Tape cross (slightly lighter where they meet) -->
  <rect x="29" y="44" width="6" height="6" fill="#0d2a5a"/>
  <!-- Bow — left loop -->
  <path d="M32,22 C28,16 16,9 18,15.5 C19,19 26,21.5 32,22 Z" fill="#FFD000"/>
  <!-- Bow — right loop -->
  <path d="M32,22 C36,16 48,9 46,15.5 C45,19 38,21.5 32,22 Z" fill="#FFD000"/>
  <!-- Bow — trailing tails -->
  <path d="M31,22.5 L24,31 L26.5,32 L32,24 L37.5,32 L40,31 L33,22.5 Z" fill="#FFBB00"/>
  <!-- Bow knot (outer) -->
  <ellipse cx="32" cy="22" rx="5" ry="3.8" fill="#FF8C00"/>
  <!-- Bow knot (inner highlight) -->
  <ellipse cx="32" cy="21.5" rx="2.8" ry="2" fill="#FFD000"/>
  <!-- Small address label on front -->
  <rect x="14" y="51" width="16" height="6" rx="1.5" fill="rgba(255,255,255,0.80)"/>
  <line x1="16" y1="53" x2="28" y2="53" stroke="#bbb" stroke-width="0.8"/>
  <line x1="16" y1="55.5" x2="25" y2="55.5" stroke="#ccc" stroke-width="0.8"/>
</svg>
