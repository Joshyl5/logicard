<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logicard — Admin Verification</title>
  <link rel="icon" href="/favicon.svg?v=2" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Raleway:wght@300;400;700;800&display=swap" rel="stylesheet" />
</head>
<body class="login-page">

  <nav class="site-header">
    <a href="/" class="site-header-logo"><span class="logi">Logi</span><span class="card">card</span></a>
    <p class="site-header-tagline">Discounts &bull; Giveaways &bull; Rewards &bull; Recognition <span class="site-header-divider">|</span> for the people who keep Britain moving</p>
    <a href="/" class="site-header-back">&lt; Back</a>
  </nav>

  <canvas id="stars"></canvas>

  <div class="login-wrap">

    <a href="/" class="login-logo-link">
      <img src="logicard-logo-hero.png" alt="Logicard" class="login-logo-img" />
    </a>

    <div class="login-card">
      <div class="admin-badge">2-Step Verification</div>
      <h1 class="login-title">Check your email</h1>
      <p class="login-subtitle">A 6-digit code has been sent to your admin email address. It expires in 10 minutes.</p>

      <form id="otpForm" class="login-form" novalidate>

        <div class="lfield">
          <label for="code">Verification Code</label>
          <input id="code" name="code" type="text" inputmode="numeric" pattern="[0-9]{6}"
                 maxlength="6" placeholder="000000" autocomplete="one-time-code"
                 style="font-size:28px;letter-spacing:10px;text-align:center;font-weight:700" required />
        </div>

        <div id="otpError" class="form-error" role="alert" aria-live="polite"></div>

        <button type="submit" class="login-submit-btn" id="otpBtn">
          <span id="otpLabel">Verify &amp; Sign In</span>
          <svg id="otpSpinner" class="spinner" viewBox="0 0 24 24" fill="none" style="display:none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2.5" stroke-dasharray="40" stroke-dashoffset="10"/>
          </svg>
        </button>

      </form>

      <p class="login-footer-text">
        Didn't receive a code? <a href="/admin-login.html" class="inline-link">Try again</a>
      </p>
    </div>

  </div>

  <script src="stars.js"></script>
  <script>
    const form    = document.getElementById('otpForm');
    const btn     = document.getElementById('otpBtn');
    const label   = document.getElementById('otpLabel');
    const spinner = document.getElementById('otpSpinner');
    const errorEl = document.getElementById('otpError');

    // Auto-advance to submit when 6 digits entered
    document.getElementById('code').addEventListener('input', function () {
      if (this.value.replace(/\D/g,'').length === 6) form.requestSubmit();
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      errorEl.classList.remove('visible');
      btn.disabled = true;
      label.style.display = 'none';
      spinner.style.display = 'block';

      const code = document.getElementById('code').value.trim();
      try {
        const res  = await fetch('/api/admin/verify-otp', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ code }) });
        const json = await res.json();
        if (!res.ok) {
          errorEl.textContent = json.error || 'Incorrect code.';
          errorEl.classList.add('visible');
          btn.disabled = false; label.style.display = 'inline'; spinner.style.display = 'none';
          if (json.error && json.error.includes('log in again')) {
            setTimeout(() => window.location.href = '/admin-login.html', 2000);
          }
          return;
        }
        window.location.href = '/admin';
      } catch {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.classList.add('visible');
        btn.disabled = false; label.style.display = 'inline'; spinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
