<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logicard — Sign In</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Raleway:wght@300;400;700;800&display=swap" rel="stylesheet" />
</head>
<body class="login-page">

  <canvas id="stars"></canvas>

  <div class="login-wrap">

    <a href="/" class="login-logo-link">
      <img src="logicard-logo.png" alt="Logicard" class="login-logo-img" />
    </a>

    <div class="login-card">
      <h1 class="login-title">Member Sign In</h1>
      <p class="login-subtitle">Access your exclusive member offers</p>

      <form id="loginForm" class="login-form" novalidate>

        <div class="lfield">
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required />
        </div>

        <div class="lfield">
          <label for="password">
            Password
            <a href="#" class="forgot-link">Forgot password?</a>
          </label>
          <div class="pw-wrap">
            <input id="password" name="password" type="password" placeholder="Your password" autocomplete="current-password" required />
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="loginError" class="form-error" role="alert" aria-live="polite"></div>

        <button type="submit" class="login-submit-btn" id="loginBtn">
          <span id="loginLabel">Sign In</span>
          <svg id="loginSpinner" class="spinner" viewBox="0 0 24 24" fill="none" style="display:none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2.5" stroke-dasharray="40" stroke-dashoffset="10"/>
          </svg>
        </button>

      </form>

      <p class="login-footer-text">
        Not a member yet?
        <a href="/signup.html" class="inline-link">Register for free</a>
      </p>
    </div>

  </div>

  <script src="stars.js"></script>
  <script src="login.js"></script>
</body>
</html>
