<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logicard — Admin Dashboard</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Raleway:wght@300;400;700;800&display=swap" rel="stylesheet" />
</head>
<body class="admin-page">

  <header class="admin-header">
    <div class="admin-header-inner">
      <div class="admin-logo">
        <img src="/logicard-logo.png" alt="Logicard" class="admin-logo-img" />
        <span class="admin-panel-badge">Admin Panel</span>
      </div>
      <div class="admin-header-right">
        <span class="admin-user-label">Administrator</span>
        <button class="signout-btn" id="adminSignout">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="admin-main">

    <!-- Stats -->
    <div class="admin-stats" id="adminStats">
      <div class="stat-card">
        <div class="stat-icon stat-icon--blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
          </svg>
        </div>
        <div class="stat-body">
          <div class="stat-value" id="statTotal">—</div>
          <div class="stat-label">Total Members</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon--gold">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <div class="stat-body">
          <div class="stat-value" id="statMonth">—</div>
          <div class="stat-label">Joined This Month</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon--green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <div class="stat-body">
          <div class="stat-value" id="statWeek">—</div>
          <div class="stat-label">Joined This Week</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon--purple">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <div class="stat-body">
          <div class="stat-value" id="statLatest">—</div>
          <div class="stat-label">Latest Member</div>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="admin-controls">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="searchInput" type="text" class="search-input" placeholder="Search by name, email, company or membership number…" />
      </div>
      <a href="/api/admin/export.csv" class="export-btn" download>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export CSV
      </a>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table class="members-table" id="membersTable">
        <thead>
          <tr>
            <th>Membership #</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Company</th>
            <th>Role</th>
            <th>City</th>
            <th>Postcode</th>
            <th>Country</th>
            <th>Joined</th>
          </tr>
        </thead>
        <tbody id="membersBody">
          <tr><td colspan="10" class="table-loading">Loading members…</td></tr>
        </tbody>
      </table>
    </div>

    <p class="table-count" id="tableCount"></p>

  </main>

  <footer class="footer">
    <p>© 2026 Logicard Admin Panel</p>
  </footer>

  <script src="/admin-dashboard.js"></script>
</body>
</html>
