<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logicard — My Dashboard</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Raleway:wght@300;400;700;800&display=swap" rel="stylesheet" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#071d40" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
</head>
<body class="members-page">

  <header class="members-header">
    <div class="mh-inner">

      <a href="/" class="mh-logo" style="border:2px solid rgba(255,179,0,0.45);padding:8px 18px;border-radius:6px;background:rgba(255,255,255,0.04);text-decoration:none;display:flex;align-items:center;">
        <span style="font-size:32px;font-weight:900;letter-spacing:-1.5px;line-height:1;font-family:'Inter',sans-serif;"><span style="color:#fff;">Logi</span><span style="color:#FFB300;">card</span></span>
      </a>

      <nav class="cat-nav">
        <a href="/member-offers" class="cat-btn" style="text-decoration:none;display:inline-block;">My Offers</a>
        <a href="/member-dashboard" class="cat-btn active" style="text-decoration:none;display:inline-block;">My Dashboard</a>
      </nav>

      <div class="mh-user">
        <div class="mh-user-info">
          <span class="mh-welcome">Welcome, <strong id="userName">...</strong></span>
          <span class="mh-badge" id="memberBadge">#...</span>
        </div>
        <button class="signout-btn" id="signoutBtn">Sign Out</button>
      </div>

    </div>
  </header>

  <section class="offers-hero">
    <div class="oh-inner">
      <h1>My Dashboard</h1>
      <p>Your account at a glance.</p>
    </div>
  </section>

  <main class="offers-main">
    <div class="offers-container">

      <div class="member-stats" id="memberStats">
        <div class="stat-card">
          <div class="stat-icon stat-icon--gold">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </div>
          <div class="stat-body">
            <div class="stat-value" id="statOffersAccepted">—</div>
            <div class="stat-label">Offers Accepted</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon--blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          </div>
          <div class="stat-body">
            <div class="stat-value" id="statReferrals">—</div>
            <div class="stat-label">Total Referrals</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon--purple">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </div>
          <div class="stat-body">
            <div class="stat-value" id="statMonthlyEntries">—</div>
            <div class="stat-label">This Month's Giveaway Entries</div>
          </div>
        </div>
      </div>

      <p class="verify-docs-title">Personal Details</p>
      <div class="detail-card" id="detailCard"></div>

    </div>
  </main>

  <footer class="footer">
    <p>© 2026 Logicard. All rights reserved. &nbsp;|&nbsp; <a href="/report">Report an Issue</a></p>
  </footer>

  <script src="/member-dashboard.js"></script>
  <script src="/pwa.js" defer></script>
</body>
</html>
